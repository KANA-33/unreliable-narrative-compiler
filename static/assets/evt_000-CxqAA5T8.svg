<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Shift Start - sixteen surveillance screens, blue badge, red pen, cold water cup">
  <defs>
    <radialGradient id="b0" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#1a2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94c8d6"/>
      <stop offset="100%" stop-color="#3a5e6a"/>
    </linearGradient>
    <filter id="grain"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#b0)"/>
  <rect width="512" height="512" filter="url(#grain)" opacity="0.55"/>

  <!-- 16 monitor grid -->
  <g transform="translate(56,40)">
    <rect width="400" height="288" fill="#0a0d0f" stroke="#3a4a52" stroke-width="2"/>
    <g>
      <!-- 4x4 screens, slightly varied phosphor -->
      <g fill="url(#screen)" opacity="0.85">
        <rect x="6"   y="6"  width="92" height="64"/>
        <rect x="104" y="6"  width="92" height="64"/>
        <rect x="202" y="6"  width="92" height="64"/>
        <rect x="300" y="6"  width="92" height="64"/>
        <rect x="6"   y="76" width="92" height="64"/>
        <rect x="104" y="76" width="92" height="64"/>
        <rect x="202" y="76" width="92" height="64" opacity="0.55"/>
        <rect x="300" y="76" width="92" height="64"/>
        <rect x="6"   y="146" width="92" height="64"/>
        <rect x="104" y="146" width="92" height="64"/>
        <!-- screen 10 highlighted -->
        <rect x="202" y="146" width="92" height="64" fill="#d6c08a"/>
        <rect x="300" y="146" width="92" height="64"/>
        <rect x="6"   y="216" width="92" height="64"/>
        <rect x="104" y="216" width="92" height="64"/>
        <rect x="202" y="216" width="92" height="64"/>
        <rect x="300" y="216" width="92" height="64"/>
      </g>
      <!-- screen labels -->
      <g font-family="monospace" font-size="9" fill="#5e7d88" opacity="0.9">
        <text x="10" y="20">01</text><text x="108" y="20">02</text><text x="206" y="20">03</text><text x="304" y="20">04</text>
        <text x="10" y="90">05</text><text x="108" y="90">06</text><text x="206" y="90">07</text><text x="304" y="90">08</text>
        <text x="10" y="160">09</text><text x="108" y="160">10</text>
        <text x="206" y="160" fill="#1c1c16" font-weight="bold">10</text>
        <text x="304" y="160">11</text>
        <text x="10" y="230">12</text><text x="108" y="230">13</text><text x="206" y="230">14</text><text x="304" y="230">15</text>
      </g>
    </g>
  </g>

  <!-- Desk slab in foreground -->
  <rect x="0" y="350" width="512" height="162" fill="#1c1612"/>
  <rect x="0" y="350" width="512" height="6" fill="#3a2a18"/>

  <!-- Manual book -->
  <g transform="translate(70,378)">
    <rect width="120" height="84" fill="#7a4a2a" stroke="#2a1409" stroke-width="2"/>
    <rect x="6" y="6" width="108" height="72" fill="#9b6336"/>
    <text x="60" y="48" text-anchor="middle" font-family="serif" font-size="11" fill="#1a0a04" font-weight="bold">DUTY MANUAL</text>
  </g>

  <!-- Red pen -->
  <g transform="translate(220,408) rotate(-12)">
    <rect width="124" height="10" rx="3" fill="#c2261c"/>
    <rect x="0" y="0" width="20" height="10" rx="3" fill="#1c1c16"/>
    <polygon points="124,0 134,5 124,10" fill="#cfcfcf"/>
  </g>

  <!-- Water cup (level normal here) -->
  <g transform="translate(380,378)">
    <path d="M0 0 L80 0 L72 80 L8 80 Z" fill="none" stroke="#9bb0b8" stroke-width="2"/>
    <path d="M6 28 L74 28 L69 76 L11 76 Z" fill="#3e6573" opacity="0.65"/>
  </g>

  <!-- Blue ID badge with cord -->
  <g transform="translate(280,360)">
    <line x1="0" y1="0" x2="14" y2="36" stroke="#1f3056" stroke-width="2"/>
    <line x1="40" y1="0" x2="26" y2="36" stroke="#1f3056" stroke-width="2"/>
    <rect x="2" y="36" width="36" height="48" fill="#2b4d8a" stroke="#0e1c33" stroke-width="2"/>
    <rect x="6" y="40" width="28" height="20" fill="#a8c0e2"/>
    <text x="20" y="76" text-anchor="middle" font-family="monospace" font-size="7" fill="#e6eef9">VALID</text>
  </g>

  <!-- Timestamp -->
  <g font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">
    <text x="56" y="356">01:00:00</text>
    <text x="402" y="356" text-anchor="end">CH01 / EVT_000</text>
  </g>
</svg>
