<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Identity Mismatch - blue VALID badge in monitor 10, red REVOKED badge on chest in reality">
  <defs>
    <radialGradient id="bg32" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="phos32" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdd9e2"/>
      <stop offset="100%" stop-color="#3a5664"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff3838" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff3838" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain32"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg32)"/>
  <rect width="512" height="512" filter="url(#grain32)" opacity="0.55"/>

  <!-- LEFT: monitor No.10 with blue badge / reflected self -->
  <g transform="translate(28,72)">
    <rect width="220" height="248" rx="6" fill="#0d1115" stroke="#3d525c" stroke-width="3"/>
    <rect x="6" y="6" width="208" height="236" fill="url(#phos32)"/>
    <text x="14" y="22" font-family="monospace" font-size="11" fill="#1a262c" font-weight="bold">CAM 10</text>
    <text x="206" y="22" text-anchor="end" font-family="monospace" font-size="11" fill="#1a262c">02:24</text>
    <!-- silhouette torso -->
    <g transform="translate(50,80)">
      <path d="M60 0 q -52 0 -60 60 l 4 80 l 112 0 l 4 -80 q -8 -60 -60 -60 z" fill="#1a262c"/>
      <!-- head dot -->
      <circle cx="60" cy="-18" r="20" fill="#1a262c"/>
      <!-- blue badge on chest in screen -->
      <g transform="translate(40,40)">
        <line x1="2" y1="-30" x2="14" y2="0" stroke="#0e1c33" stroke-width="2"/>
        <line x1="38" y1="-30" x2="26" y2="0" stroke="#0e1c33" stroke-width="2"/>
        <rect x="2" y="0" width="36" height="48" fill="#2b4d8a" stroke="#0e1c33" stroke-width="2"/>
        <text x="20" y="32" text-anchor="middle" font-family="monospace" font-size="8" fill="#e6eef9" font-weight="bold">VALID</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: reality torso with red revoked badge -->
  <circle cx="364" cy="240" r="160" fill="url(#redGlow)"/>
  <g transform="translate(264,72)">
    <rect width="220" height="248" rx="3" fill="#13100c" stroke="#3a2a18" stroke-width="2"/>
    <text x="14" y="22" font-family="monospace" font-size="11" fill="#9aa6ae" font-weight="bold">REALITY</text>
    <text x="206" y="22" text-anchor="end" font-family="monospace" font-size="11" fill="#9aa6ae">02:24</text>
    <!-- silhouette torso -->
    <g transform="translate(50,80)">
      <path d="M60 0 q -52 0 -60 60 l 4 80 l 112 0 l 4 -80 q -8 -60 -60 -60 z" fill="#2c2620"/>
      <circle cx="60" cy="-18" r="20" fill="#2c2620"/>
      <!-- red badge on chest in reality -->
      <g transform="translate(40,40)">
        <line x1="2" y1="-30" x2="14" y2="0" stroke="#3a0a0a" stroke-width="2"/>
        <line x1="38" y1="-30" x2="26" y2="0" stroke="#3a0a0a" stroke-width="2"/>
        <rect x="2" y="0" width="36" height="48" fill="#a6151c" stroke="#3a0a0a" stroke-width="2"/>
        <text x="20" y="22" text-anchor="middle" font-family="monospace" font-size="6" fill="#fff" font-weight="bold">STATUS:</text>
        <text x="20" y="38" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff" font-weight="bold">REVOKED</text>
      </g>
    </g>
  </g>

  <!-- divider with mismatch tag -->
  <line x1="256" y1="72" x2="256" y2="320" stroke="#c2261c" stroke-width="2" stroke-dasharray="4 4"/>
  <g transform="translate(256,40)">
    <rect x="-90" y="0" width="180" height="22" fill="#a6151c"/>
    <text x="0" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">CREDENTIAL CONFLICT</text>
  </g>

  <!-- broadcast lower bar -->
  <g transform="translate(40,396)">
    <rect width="432" height="74" fill="#0a0c0e" stroke="#3a4a52" stroke-width="2"/>
    <text x="14" y="20" font-family="monospace" font-size="10" fill="#c2261c" font-weight="bold">▶ BROADCAST / URGENT</text>
    <text x="14" y="42" font-family="monospace" font-size="11" fill="#d6c08a">"Identity credential conflict detected."</text>
    <text x="14" y="62" font-family="monospace" font-size="11" fill="#d6c08a">"Calibrate immediately or be evicted."</text>
  </g>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH03 / EVT_002 — TWO YOUS, ONE BUILDING</text>
</svg>
