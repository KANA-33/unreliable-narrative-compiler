<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Choice The Alignment - open drawer in surveillance blind spot reveals a spare blue ID badge">
  <defs>
    <radialGradient id="bg33" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#22282c"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="drawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#0e0805"/>
    </linearGradient>
    <linearGradient id="drawerInside" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a120a"/>
      <stop offset="100%" stop-color="#070504"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a6abf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3a6abf" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain33"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg33)"/>
  <rect width="512" height="512" filter="url(#grain33)" opacity="0.55"/>

  <!-- camera with crossed-out cone (blind spot indicator) -->
  <g transform="translate(40,40)">
    <rect width="50" height="28" rx="4" fill="#1c1f22" stroke="#3a4046" stroke-width="1.5"/>
    <circle cx="42" cy="14" r="6" fill="#0a0c0e" stroke="#3a4046" stroke-width="1"/>
    <circle cx="42" cy="14" r="2.5" fill="#c2261c"/>
    <!-- crossed out -->
    <line x1="-6" y1="-4" x2="58" y2="34" stroke="#c2261c" stroke-width="2.5"/>
    <text x="0" y="50" font-family="monospace" font-size="10" fill="#c2261c" font-weight="bold">BLIND SPOT</text>
  </g>

  <!-- desk plane -->
  <rect x="0" y="200" width="512" height="312" fill="#1c1612"/>
  <rect x="0" y="200" width="512" height="6" fill="#3a2a18"/>

  <!-- open drawer -->
  <g transform="translate(110,220)">
    <!-- drawer body -->
    <rect width="292" height="180" fill="url(#drawer)" stroke="#1a0e05" stroke-width="3"/>
    <!-- inside cavity -->
    <polygon points="20,20 272,20 252,164 40,164" fill="url(#drawerInside)"/>
    <!-- glow over interior -->
    <ellipse cx="146" cy="100" rx="120" ry="50" fill="url(#blueGlow)"/>
    <!-- handle -->
    <rect x="120" y="166" width="52" height="10" rx="2" fill="#7a5a26"/>

    <!-- spare blue badge with cord, lying inside -->
    <g transform="translate(76,72) rotate(-9)">
      <line x1="0" y1="0" x2="22" y2="56" stroke="#0e1c33" stroke-width="2"/>
      <line x1="60" y1="0" x2="38" y2="56" stroke="#0e1c33" stroke-width="2"/>
      <rect x="14" y="56" width="48" height="64" fill="#2b4d8a" stroke="#0e1c33" stroke-width="2"/>
      <rect x="20" y="62" width="36" height="22" fill="#a8c0e2"/>
      <text x="38" y="78" text-anchor="middle" font-family="monospace" font-size="6" fill="#0e1c33" font-weight="bold">ID</text>
      <text x="38" y="106" text-anchor="middle" font-family="monospace" font-size="9" fill="#e6eef9" font-weight="bold">VALID</text>
      <!-- highlight on plastic -->
      <line x1="14" y1="56" x2="20" y2="116" stroke="#e6eef9" stroke-width="1.5" opacity="0.45"/>
    </g>
  </g>

  <!-- broadcast bar -->
  <g transform="translate(40,420)">
    <rect width="432" height="68" fill="#0a0c0e" stroke="#3a4a52" stroke-width="2"/>
    <text x="14" y="20" font-family="monospace" font-size="10" fill="#c2261c" font-weight="bold">▶ BROADCAST / RESOLVED INSIDE SKULL</text>
    <text x="14" y="42" font-family="monospace" font-size="11" fill="#d6c08a">"Reality link supports only a single archive."</text>
    <text x="14" y="60" font-family="monospace" font-size="11" fill="#d6c08a">"Determine the final data flow."</text>
  </g>

  <!-- caption -->
  <text x="20" y="500" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH03 / EVT_003 — ANCHOR: ACCEPT or DISCARD</text>
</svg>
