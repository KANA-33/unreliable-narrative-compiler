<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="g3c" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#1a1028"/>
      <stop offset="100%" stop-color="#02000a"/>
    </radialGradient>
    <filter id="n3c"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.30 0 0 0 0 0.22 0 0 0 0 0.42 0 0 0 0.20 0"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#g3c)"/>
  <!-- desk surface -->
  <path d="M0 250 Q200 240 400 252 L400 400 L0 400 Z" fill="#18122a" opacity="0.9"/>
  <!-- two badges side by side -->
  <!-- spare badge (left, neutral) -->
  <g transform="translate(130 280) rotate(-8)">
    <rect x="-50" y="-36" width="100" height="72" rx="4" fill="#d8d0b8" stroke="#8a7a5a" stroke-width="1"/>
    <rect x="-44" y="-30" width="88"  height="30" fill="#2a2418"/>
    <rect x="-42" y="-28" width="84"  height="26" fill="#1a140c"/>
    <!-- photo area placeholder -->
    <rect x="-20" y="-22" width="16" height="16" fill="#4a3a2a"/>
    <!-- stripes / id lines -->
    <line x1="-44" y1="8"  x2="44" y2="8"  stroke="#6a5a3a" stroke-width="0.5"/>
    <line x1="-44" y1="18" x2="44" y2="18" stroke="#6a5a3a" stroke-width="0.5"/>
    <line x1="-44" y1="26" x2="44" y2="26" stroke="#6a5a3a" stroke-width="0.5"/>
    <text x="-30" y="14" font-family="monospace" font-size="6" fill="#3a2a14">ID-087 SPARE</text>
    <!-- lanyard punch -->
    <circle cx="0" cy="-32" r="2.2" fill="#02000a"/>
  </g>
  <!-- red badge (right, anomaly) -->
  <g transform="translate(270 280) rotate(7)">
    <rect x="-50" y="-36" width="100" height="72" rx="4" fill="#c42424" stroke="#6a0a0a" stroke-width="1"/>
    <rect x="-44" y="-30" width="88"  height="30" fill="#1a0000"/>
    <rect x="-42" y="-28" width="84"  height="26" fill="#0a0000"/>
    <rect x="-20" y="-22" width="16" height="16" fill="#5a0000"/>
    <line x1="-44" y1="8"  x2="44" y2="8"  stroke="#8a1010" stroke-width="0.5"/>
    <line x1="-44" y1="18" x2="44" y2="18" stroke="#8a1010" stroke-width="0.5"/>
    <line x1="-44" y1="26" x2="44" y2="26" stroke="#8a1010" stroke-width="0.5"/>
    <text x="-30" y="14" font-family="monospace" font-size="6" fill="#f0c8c8">ID-??? OBSERVER</text>
    <circle cx="0" cy="-32" r="2.2" fill="#02000a"/>
    <!-- red glow -->
    <circle cx="0" cy="0" r="56" fill="#c42424" opacity="0.08"/>
  </g>
  <!-- UV purple crosshatch between the two badges (the choice hangs here) -->
  <g stroke="#a060e0" stroke-width="0.5" opacity="0.6">
    <line x1="180" y1="260" x2="220" y2="300"/>
    <line x1="180" y1="300" x2="220" y2="260"/>
  </g>
  <!-- drop shadows -->
  <ellipse cx="130" cy="330" r="56" ry="8" fill="#02000a" opacity="0.45" transform="scale(1,0.4) translate(0 495)"/>
  <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#c090f0" opacity="0.75">CALIBRATION · CHOOSE ONE</text>
  <rect width="400" height="400" filter="url(#n3c)"/>
</svg>
