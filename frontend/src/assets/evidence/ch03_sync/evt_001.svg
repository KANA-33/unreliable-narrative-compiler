<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Infinite Distance - hand reaches for the Duty Manual but space is impossibly stretched">
  <defs>
    <radialGradient id="bg31" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="manual" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a05a2a"/>
      <stop offset="100%" stop-color="#5a2e10"/>
    </linearGradient>
    <linearGradient id="desk31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#0e0805"/>
    </linearGradient>
    <filter id="grain31"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg31)"/>
  <rect width="512" height="512" filter="url(#grain31)" opacity="0.55"/>

  <!-- impossible perspective desk: foreshortened toward right -->
  <polygon points="0,300 512,200 512,512 0,512" fill="url(#desk31)"/>
  <line x1="0" y1="300" x2="512" y2="200" stroke="#5a4220" stroke-width="2"/>

  <!-- guide perspective lines (impossible) -->
  <g stroke="#9aa6ae" stroke-width="1" stroke-dasharray="4 6" opacity="0.45">
    <line x1="80" y1="500" x2="420" y2="220"/>
    <line x1="180" y1="500" x2="440" y2="220"/>
    <line x1="280" y1="500" x2="460" y2="220"/>
  </g>

  <!-- manual far away (small) -->
  <g transform="translate(424,196)">
    <rect width="64" height="44" fill="url(#manual)" stroke="#1a0a04" stroke-width="1.5"/>
    <rect x="3" y="3" width="58" height="38" fill="#9b6336"/>
    <text x="32" y="26" text-anchor="middle" font-family="serif" font-size="6" fill="#1a0a04" font-weight="bold">DUTY MANUAL</text>
  </g>

  <!-- distance arrow with impossible label -->
  <g transform="translate(196,220)">
    <line x1="0" y1="0" x2="220" y2="0" stroke="#c2261c" stroke-width="2" stroke-dasharray="6 4"/>
    <polygon points="220,0 212,-5 212,5" fill="#c2261c"/>
    <text x="110" y="-8" text-anchor="middle" font-family="monospace" font-size="11" fill="#c2261c" font-weight="bold">∞ — UNREACHABLE</text>
  </g>

  <!-- reaching hand from left foreground (huge) -->
  <g transform="translate(28,278)">
    <path d="M0 80 q 80 -50 168 -34 q 28 6 56 24 q -10 14 -36 16 l -118 4 q -52 -2 -70 -10 z" fill="#5a4630"/>
    <path d="M194 70 q 28 -2 48 8 l -2 14 q -28 4 -52 -4 z" fill="#5a4630"/>
    <rect x="-10" y="68" width="22" height="26" fill="#1f1610"/>
  </g>

  <!-- broadcast bubble: Backup alignment in progress -->
  <g transform="translate(40,40)">
    <rect width="276" height="60" rx="4" fill="#0a0c0e" stroke="#3a4a52" stroke-width="2"/>
    <text x="14" y="20" font-family="monospace" font-size="10" fill="#9aa6ae">▶ INTERCOM</text>
    <text x="14" y="38" font-family="monospace" font-size="11" fill="#d6c08a" font-weight="bold">"Backup alignment in progress..."</text>
    <text x="14" y="54" font-family="monospace" font-size="10" fill="#c2261c">"Unanchored consciousness detected."</text>
  </g>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH03 / EVT_001 — SPACE STRETCHED</text>
</svg>
