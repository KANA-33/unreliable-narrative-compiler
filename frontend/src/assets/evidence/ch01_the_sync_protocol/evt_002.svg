<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="First Alignment - hand nudges the pen, pen rolls and impacts the floor">
  <defs>
    <radialGradient id="b2" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <filter id="grain2"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#b2)"/>
  <rect width="512" height="512" filter="url(#grain2)" opacity="0.55"/>

  <!-- Desk -->
  <rect x="0" y="240" width="512" height="40" fill="#3a2a18"/>
  <rect x="0" y="280" width="512" height="232" fill="#1c1612"/>
  <!-- Floor -->
  <rect x="0" y="430" width="512" height="82" fill="#0d0a07"/>
  <line x1="0" y1="430" x2="512" y2="430" stroke="#2a1a0a" stroke-width="2"/>

  <!-- Hand silhouette nudging pen -->
  <g transform="translate(70,170)">
    <path d="M0 60 q40 -36 86 -22 q22 6 36 24 q-12 8 -28 8 l-58 6 q-22 -2 -36 -16 z" fill="#5a4630"/>
    <!-- index finger pushing -->
    <path d="M122 62 q22 -2 38 6 l-2 12 q-22 4 -40 -2 z" fill="#5a4630"/>
    <!-- cuff -->
    <rect x="-8" y="50" width="22" height="22" fill="#1f1610"/>
  </g>

  <!-- Red pen at the edge, falling off -->
  <g transform="translate(245,238) rotate(8)">
    <rect width="120" height="10" rx="3" fill="#c2261c"/>
    <rect width="18" height="10" rx="3" fill="#0d0d0a"/>
    <polygon points="120,0 130,5 120,10" fill="#cfcfcf"/>
  </g>
  <!-- Motion arc to floor -->
  <path d="M370 246 Q420 320 388 420" fill="none" stroke="#c2261c" stroke-width="2" stroke-dasharray="6 6" opacity="0.8"/>
  <!-- Pen hitting floor -->
  <g transform="translate(326,420) rotate(72)">
    <rect width="120" height="10" rx="3" fill="#c2261c"/>
    <rect width="18" height="10" rx="3" fill="#0d0d0a"/>
    <polygon points="120,0 130,5 120,10" fill="#cfcfcf"/>
  </g>
  <!-- Impact lines -->
  <g stroke="#d6c08a" stroke-width="2" opacity="0.85" fill="none" stroke-linecap="round">
    <path d="M388 420 l -16 -14"/>
    <path d="M388 420 l 18 -10"/>
    <path d="M388 420 l 4 -22"/>
    <path d="M388 420 l 22 4"/>
  </g>
  <text x="412" y="412" font-family="monospace" font-size="13" fill="#d6c08a" font-weight="bold">CLICK</text>

  <!-- Caption -->
  <g font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">
    <text x="20" y="500">CH01 / EVT_002 — ALIGNMENT EXECUTED</text>
  </g>
</svg>
