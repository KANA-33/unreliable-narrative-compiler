<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gravity Inversion - water in cup tilts 45 degrees while monitor shows it level">
  <defs>
    <radialGradient id="b3" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="phos3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdd9e2"/>
      <stop offset="100%" stop-color="#445e6a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fa1b8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2c5e75" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="grain3"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#b3)"/>
  <rect width="512" height="512" filter="url(#grain3)" opacity="0.55"/>

  <!-- Monitor in upper right (level water reference) -->
  <g transform="translate(296,40)">
    <rect width="180" height="138" rx="6" fill="#0d1115" stroke="#3d525c" stroke-width="3"/>
    <rect x="6" y="6" width="168" height="126" fill="url(#phos3)"/>
    <text x="14" y="22" font-family="monospace" font-size="11" fill="#1a262c" font-weight="bold">CAM 10</text>
    <text x="166" y="22" text-anchor="end" font-family="monospace" font-size="11" fill="#1a262c">01:30</text>
    <!-- Cup on monitor (level) -->
    <g transform="translate(58,40)">
      <path d="M0 0 L66 0 L60 76 L6 76 Z" fill="none" stroke="#1a262c" stroke-width="2"/>
      <path d="M5 18 L61 18 L57 72 L9 72 Z" fill="#1a262c" opacity="0.55"/>
      <line x1="5" y1="18" x2="61" y2="18" stroke="#1a262c" stroke-width="2"/>
    </g>
    <text x="90" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#1a262c">LEVEL: NORMAL</text>
  </g>

  <!-- Desk in foreground -->
  <rect x="0" y="320" width="512" height="192" fill="#1c1612"/>
  <rect x="0" y="320" width="512" height="6" fill="#3a2a18"/>

  <!-- Real cup with tilted water -->
  <g transform="translate(120,210)">
    <path d="M0 0 L130 0 L116 160 L14 160 Z" fill="none" stroke="#dfe5ea" stroke-width="3"/>
    <!-- water at 45deg tilt -->
    <clipPath id="cupclip">
      <path d="M3 4 L127 4 L114 156 L16 156 Z"/>
    </clipPath>
    <g clip-path="url(#cupclip)">
      <polygon points="-20,40 160,128 160,170 -20,170" fill="url(#water)"/>
      <polygon points="-20,38 160,126 160,134 -20,46" fill="#a8d6e3" opacity="0.9"/>
    </g>
    <!-- highlight -->
    <line x1="14" y1="6" x2="22" y2="80" stroke="#fff" stroke-width="2" opacity="0.45"/>
  </g>

  <!-- 45deg indicator -->
  <g transform="translate(80,270)" stroke="#c2261c" stroke-width="2" fill="none">
    <line x1="0" y1="60" x2="60" y2="60"/>
    <line x1="0" y1="60" x2="42" y2="18"/>
    <path d="M40 60 a20 20 0 0 0 -14 -14" stroke-width="1.5"/>
    <text x="44" y="50" font-family="monospace" font-size="13" fill="#c2261c" font-weight="bold">45°</text>
  </g>

  <!-- Annotation -->
  <text x="256" y="494" text-anchor="middle" font-family="monospace" font-size="12" fill="#c2261c" font-weight="bold">GRAVITY ANOMALY — REALITY DESYNC</text>
</svg>
