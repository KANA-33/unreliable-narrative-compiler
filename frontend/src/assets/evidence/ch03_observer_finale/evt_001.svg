<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="g3b" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#301848"/>
      <stop offset="60%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#02000a"/>
    </radialGradient>
    <filter id="n3b"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.22 0 0 0 0 0.48 0 0 0 0.22 0"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#g3b)"/>
  <!-- hallway floor -->
  <path d="M0 300 L160 200 L240 200 L400 300 L400 400 L0 400 Z" fill="#180628" opacity="0.9"/>
  <!-- wall planes -->
  <path d="M0 0 L160 200 L160 300 L0 300 Z"     fill="#0a0418" opacity="0.85"/>
  <path d="M400 0 L240 200 L240 300 L400 300 Z" fill="#0a0418" opacity="0.85"/>
  <!-- purple ceiling tube light -->
  <rect x="170" y="60" width="60" height="6" fill="#e080ff" opacity="0.9"/>
  <rect x="165" y="58" width="70" height="14" fill="#a060e0" opacity="0.35"/>
  <!-- volumetric cone spill -->
  <path d="M170 66 L110 300 L290 300 L230 66 Z" fill="#8040c0" opacity="0.10"/>
  <!-- the watcher silhouette -->
  <g transform="translate(200 250)">
    <!-- body -->
    <ellipse cx="0" cy="40" rx="28" ry="18" fill="#02000a" opacity="0.95"/>
    <rect x="-22" y="-20" width="44" height="60" rx="6" fill="#02000a"/>
    <!-- shoulders -->
    <path d="M-30 -8 Q 0 -28, 30 -8" fill="#02000a"/>
    <!-- head -->
    <ellipse cx="0" cy="-34" rx="16" ry="18" fill="#02000a"/>
    <!-- UV rim on the shoulders and head -->
    <path d="M-28 -10 Q 0 -30, 28 -10" fill="none" stroke="#c080ff" stroke-width="0.8" opacity="0.75"/>
    <path d="M-14 -46 Q 0 -52, 14 -46" fill="none" stroke="#c080ff" stroke-width="0.6" opacity="0.7"/>
    <!-- faint eye glint -->
    <circle cx="-5" cy="-36" r="1" fill="#f0c0ff" opacity="0.85"/>
    <circle cx="5"  cy="-36" r="1" fill="#f0c0ff" opacity="0.85"/>
  </g>
  <!-- elongated shadow on the floor -->
  <path d="M200 270 L180 400 L220 400 Z" fill="#02000a" opacity="0.85"/>
  <!-- particulate in the light -->
  <g fill="#e0c0ff" opacity="0.4">
    <circle cx="180" cy="140" r="0.6"/>
    <circle cx="210" cy="160" r="0.8"/>
    <circle cx="195" cy="200" r="0.5"/>
    <circle cx="225" cy="180" r="0.7"/>
    <circle cx="170" cy="220" r="0.6"/>
  </g>
  <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#c080ff" opacity="0.7">HALLWAY · OBSERVER PRESENT</text>
  <rect width="400" height="400" filter="url(#n3b)"/>
</svg>
