<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="g3d" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#281838"/>
      <stop offset="100%" stop-color="#02000a"/>
    </radialGradient>
    <filter id="n3d"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.30 0 0 0 0 0.22 0 0 0 0 0.42 0 0 0 0.22 0"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#g3d)"/>
  <!-- old paper file at the center -->
  <g transform="translate(200 210) rotate(-2)">
    <rect x="-110" y="-130" width="220" height="260" rx="2" fill="#e8dcbf" stroke="#5a3a22" stroke-width="1"/>
    <!-- header stamp -->
    <rect x="-98" y="-118" width="196" height="20" fill="none" stroke="#a0141a" stroke-width="1.2"/>
    <text x="0" y="-104" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0141a" letter-spacing="3">CASE CLOSED</text>
    <!-- ruled body text -->
    <g stroke="#4a3a22" stroke-width="0.5" opacity="0.65">
      <line x1="-98" y1="-80"  x2="70"  y2="-80"/>
      <line x1="-98" y1="-64"  x2="95"  y2="-64"/>
      <line x1="-98" y1="-48"  x2="80"  y2="-48"/>
      <line x1="-98" y1="-32"  x2="98"  y2="-30"/>
      <line x1="-98" y1="-16"  x2="60"  y2="-16"/>
      <line x1="-98" y1="0"    x2="88"  y2="2"/>
      <line x1="-98" y1="16"   x2="72"  y2="18"/>
      <line x1="-98" y1="32"   x2="98"  y2="32"/>
      <line x1="-98" y1="48"   x2="58"  y2="48"/>
    </g>
    <!-- redacted bars -->
    <rect x="-60" y="-88"  width="80" height="10" fill="#02000a" opacity="0.92"/>
    <rect x="-40" y="-40"  width="120" height="10" fill="#02000a" opacity="0.92"/>
    <rect x="-70" y="24"   width="60"  height="10" fill="#02000a" opacity="0.92"/>
    <!-- footer: observer signature -->
    <text x="0" y="90" text-anchor="middle" font-family="'Permanent Marker',cursive" font-size="18" fill="#5a0a0a" transform="rotate(-4 0 90)">OBSERVER</text>
    <line x1="-70" y1="100" x2="70" y2="100" stroke="#5a0a0a" stroke-width="0.6"/>
    <text x="0" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#3a2a14">SIGNED · SHIFT 2157-05-12</text>
    <!-- wax seal lower right -->
    <circle cx="86" cy="104" r="14" fill="#8a1010" stroke="#5a0a0a" stroke-width="1"/>
    <text x="86" y="108" text-anchor="middle" font-family="monospace" font-size="8" fill="#f8e8c8">OBS</text>
  </g>
  <!-- UV backlight halo -->
  <circle cx="200" cy="200" r="180" fill="#a060e0" opacity="0.05"/>
  <!-- floating dust -->
  <g fill="#e0c0ff" opacity="0.35">
    <circle cx="90"  cy="110" r="0.7"/>
    <circle cx="310" cy="140" r="0.6"/>
    <circle cx="60"  cy="260" r="0.8"/>
    <circle cx="330" cy="280" r="0.5"/>
    <circle cx="110" cy="340" r="0.6"/>
  </g>
  <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#c090f0" opacity="0.75">ARCHIVE · SHIFT CLOSED</text>
  <rect width="400" height="400" filter="url(#n3d)"/>
</svg>
