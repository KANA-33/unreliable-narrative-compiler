<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g2b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2218"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <filter id="n2b"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.32 0 0 0 0 0.26 0 0 0 0 0.16 0 0 0 0.20 0"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#g2b)"/>
  <!-- open manual page -->
  <g transform="translate(80 70) rotate(-2)">
    <rect x="0" y="0" width="240" height="260" rx="2" fill="#e8dcbf" stroke="#a48a5a" stroke-width="1"/>
    <rect x="6" y="6" width="228" height="248" fill="none" stroke="#c4a86a" stroke-width="0.4"/>
    <!-- ruled lines -->
    <g stroke="#6a5a3a" stroke-width="0.3" opacity="0.5">
      <line x1="20" y1="40"  x2="220" y2="40"/>
      <line x1="20" y1="58"  x2="220" y2="58"/>
      <line x1="20" y1="76"  x2="220" y2="76"/>
      <line x1="20" y1="94"  x2="220" y2="94"/>
      <line x1="20" y1="112" x2="220" y2="112"/>
      <line x1="20" y1="130" x2="220" y2="130"/>
      <line x1="20" y1="148" x2="220" y2="148"/>
      <line x1="20" y1="166" x2="220" y2="166"/>
      <line x1="20" y1="184" x2="220" y2="184"/>
      <line x1="20" y1="202" x2="220" y2="202"/>
      <line x1="20" y1="220" x2="220" y2="220"/>
    </g>
    <!-- heading -->
    <text x="120" y="28" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a2a14">§ 7 — BLIND SPOT PROTOCOL</text>
    <!-- body text (scribbled dashes) -->
    <g stroke="#4a3a22" stroke-width="0.6" opacity="0.65">
      <line x1="22" y1="52"  x2="200" y2="52"/>
      <line x1="22" y1="70"  x2="180" y2="70"/>
      <line x1="22" y1="88"  x2="215" y2="88"/>
      <line x1="22" y1="106" x2="160" y2="106"/>
      <line x1="22" y1="142" x2="210" y2="142"/>
      <line x1="22" y1="160" x2="190" y2="160"/>
      <line x1="22" y1="178" x2="200" y2="178"/>
    </g>
    <!-- rule 3, underlined and circled -->
    <text x="22" y="126" font-family="monospace" font-size="9" fill="#2a1a0a">Rule 3. Do not leave the monitoring hub</text>
    <text x="22" y="136" font-family="monospace" font-size="9" fill="#2a1a0a">during an unverified directive.</text>
    <!-- red pen annotation crossing it out -->
    <line x1="18" y1="126" x2="220" y2="134" stroke="#c42424" stroke-width="1.2" opacity="0.8"/>
    <line x1="18" y1="130" x2="220" y2="138" stroke="#c42424" stroke-width="1.2" opacity="0.6"/>
    <text x="150" y="118" font-family="'Permanent Marker',cursive" font-size="12" fill="#c42424" transform="rotate(-3 150 118)">IGNORE</text>
  </g>
  <!-- phone cord trailing off the page -->
  <path d="M340 30 Q 350 120, 320 200 T 340 360"
        fill="none" stroke="#5a3a1a" stroke-width="1" opacity="0.6"/>
  <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4a070" opacity="0.7">MANUAL · RULE OVERRIDDEN</text>
  <rect width="400" height="400" filter="url(#n2b)"/>
</svg>
