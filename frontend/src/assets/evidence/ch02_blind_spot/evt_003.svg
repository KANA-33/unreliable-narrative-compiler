<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Choice The Frozen Valve - hand reaches for a frost-covered metal valve, with a fresh frostbite mark on the palm">
  <defs>
    <radialGradient id="bg23" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4046"/>
      <stop offset="50%" stop-color="#5b6166"/>
      <stop offset="100%" stop-color="#1c1f22"/>
    </linearGradient>
    <radialGradient id="frost" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e6f7ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9fc5d6" stop-opacity="0.05"/>
    </radialGradient>
    <filter id="grain23"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg23)"/>
  <rect width="512" height="512" filter="url(#grain23)" opacity="0.55"/>

  <!-- frost glow halo behind valve -->
  <circle cx="306" cy="234" r="170" fill="url(#frost)"/>

  <!-- vertical pipe -->
  <rect x="282" y="40" width="48" height="432" fill="url(#pipe)" stroke="#0a0c0e" stroke-width="2"/>
  <rect x="280" y="40" width="52" height="14" fill="#1c1f22"/>
  <rect x="280" y="458" width="52" height="14" fill="#1c1f22"/>
  <!-- AVALON tag plate -->
  <g transform="translate(282,86)">
    <rect width="48" height="22" fill="#0a0c0e" stroke="#c2261c" stroke-width="1.5"/>
    <text x="24" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#c2261c" font-weight="bold">AVALON</text>
  </g>

  <!-- valve wheel -->
  <g transform="translate(306,234)">
    <circle r="92" fill="#3a4046" stroke="#0a0c0e" stroke-width="3"/>
    <circle r="80" fill="#5b6166" stroke="#0a0c0e" stroke-width="1.5"/>
    <!-- spokes -->
    <g stroke="#0a0c0e" stroke-width="6">
      <line x1="-78" y1="0" x2="78" y2="0"/>
      <line x1="0" y1="-78" x2="0" y2="78"/>
      <line x1="-55" y1="-55" x2="55" y2="55"/>
      <line x1="-55" y1="55" x2="55" y2="-55"/>
    </g>
    <circle r="14" fill="#0a0c0e"/>
    <!-- ice crystals on rim -->
    <g fill="#e6f7ff" opacity="0.95">
      <polygon points="-90,-6 -78,-12 -76,-2 -88,4"/>
      <polygon points="90,8 76,2 78,14 92,12"/>
      <polygon points="-6,-90 0,-78 8,-92"/>
      <polygon points="0,90 -10,78 4,82"/>
      <polygon points="-66,-66 -54,-58 -64,-54"/>
      <polygon points="62,62 54,52 70,56"/>
    </g>
  </g>

  <!-- hand reaching from left -->
  <g transform="translate(34,288)">
    <path d="M0 60 q 60 -50 124 -36 q 30 6 56 30 q -10 12 -36 14 l -84 4 q -42 0 -60 -12 z" fill="#5a4630"/>
    <!-- reaching fingers -->
    <path d="M158 50 q 30 -4 50 6 l -2 14 q -28 6 -52 -2 z" fill="#5a4630"/>
    <!-- cuff -->
    <rect x="-12" y="48" width="22" height="24" fill="#1f1610"/>
    <!-- frostbite mark -->
    <ellipse cx="146" cy="54" rx="14" ry="9" fill="#f4f7fa"/>
    <ellipse cx="146" cy="54" rx="9" ry="6" fill="#fff"/>
  </g>

  <!-- vapor curls -->
  <g fill="none" stroke="#9fc5d6" stroke-width="2" opacity="0.7">
    <path d="M280 196 q -8 -20 12 -28 q 14 -6 6 -22"/>
    <path d="M334 200 q 14 -16 4 -32 q -8 -10 8 -22"/>
  </g>

  <!-- countdown badge -->
  <g transform="translate(396,52)">
    <rect width="92" height="36" fill="#1a0606" stroke="#c2261c" stroke-width="2"/>
    <text x="46" y="14" text-anchor="middle" font-family="monospace" font-size="9" fill="#c2261c">COUNTDOWN</text>
    <text x="46" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff5050" font-weight="bold">10s</text>
  </g>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#9fc5d6" opacity="0.9" font-weight="bold">CH02 / EVT_003 — VALVE: COLDER THAN ICE</text>
</svg>
