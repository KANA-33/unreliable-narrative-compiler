<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g2d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181a14"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <filter id="n2d"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.28 0 0 0 0 0.28 0 0 0 0 0.22 0 0 0 0.20 0"/></filter>
  </defs>
  <rect width="400" height="400" fill="url(#g2d)"/>
  <!-- archive cabinet rows -->
  <g stroke="#2a2a26" stroke-width="0.6">
    <line x1="0" y1="86"  x2="400" y2="86"/>
    <line x1="0" y1="168" x2="400" y2="168"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
  </g>
  <g fill="#332e22" stroke="#1a1810" stroke-width="0.5">
    <rect x="20"  y="28"  width="54" height="52"/>
    <rect x="80"  y="30"  width="62" height="50"/>
    <rect x="148" y="26"  width="48" height="56"/>
    <rect x="202" y="30"  width="60" height="50"/>
    <rect x="268" y="28"  width="50" height="54"/>
    <rect x="324" y="30"  width="56" height="52"/>

    <rect x="24"  y="110" width="58" height="52"/>
    <rect x="88"  y="108" width="56" height="56"/>
    <rect x="150" y="112" width="60" height="50"/>
    <rect x="216" y="110" width="50" height="54"/>
    <rect x="272" y="112" width="58" height="50"/>
    <rect x="336" y="110" width="46" height="52"/>

    <rect x="20"  y="192" width="60" height="54"/>
    <rect x="86"  y="194" width="50" height="52"/>
    <rect x="142" y="192" width="58" height="54"/>
    <rect x="206" y="194" width="54" height="50"/>
    <rect x="266" y="192" width="60" height="52"/>
    <rect x="332" y="194" width="50" height="52"/>
  </g>
  <!-- single file pulled out, tied with red string -->
  <g transform="translate(200 310) rotate(-4)">
    <rect x="-80" y="-36" width="160" height="72" fill="#e8dcbf" stroke="#8a6a3a" stroke-width="1"/>
    <line x1="-80" y1="-20" x2="80"  y2="-18" stroke="#6a5030" stroke-width="0.5" opacity="0.6"/>
    <line x1="-80" y1="-8"  x2="80"  y2="-6"  stroke="#6a5030" stroke-width="0.5" opacity="0.6"/>
    <line x1="-80" y1="4"   x2="80"  y2="6"   stroke="#6a5030" stroke-width="0.5" opacity="0.6"/>
    <line x1="-80" y1="16"  x2="80"  y2="18"  stroke="#6a5030" stroke-width="0.5" opacity="0.6"/>
    <!-- red tie string -->
    <rect x="-3" y="-42" width="6" height="84" fill="#a01818" opacity="0.85"/>
    <!-- wax seal -->
    <circle cx="0" cy="0" r="10" fill="#8a1010" stroke="#5a0a0a" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="monospace" font-size="8" fill="#f8e8c8">14C</text>
    <!-- stamped label -->
    <text x="-70" y="-25" font-family="monospace" font-size="7" fill="#4a3a20" letter-spacing="1">CASE: BLIND_SPOT_07</text>
    <text x="-70" y="32"  font-family="monospace" font-size="7" fill="#4a3a20" letter-spacing="1">STATUS: SEALED · DO NOT OPEN</text>
  </g>
  <!-- spotlight -->
  <ellipse cx="200" cy="310" rx="140" ry="60" fill="#f0e0a0" opacity="0.05"/>
  <text x="200" y="378" text-anchor="middle" font-family="monospace" font-size="10" fill="#9a9a7a" opacity="0.7">ARCHIVE · FILE 14C-07</text>
  <rect width="400" height="400" filter="url(#n2d)"/>
</svg>
