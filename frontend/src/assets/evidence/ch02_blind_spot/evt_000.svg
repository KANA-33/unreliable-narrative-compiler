<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Sealed Protocol - heavy pressurized door with SEALED status panel">
  <defs>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f44"/>
      <stop offset="100%" stop-color="#16191c"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b6166"/>
      <stop offset="50%" stop-color="#7e858a"/>
      <stop offset="100%" stop-color="#3e4347"/>
    </linearGradient>
    <radialGradient id="bg2_0" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <filter id="grain20"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg2_0)"/>
  <rect width="512" height="512" filter="url(#grain20)" opacity="0.55"/>

  <!-- floor & wall -->
  <rect x="0" y="420" width="512" height="92" fill="#0d0a07"/>
  <line x1="0" y1="420" x2="512" y2="420" stroke="#2a1a0a" stroke-width="2"/>

  <!-- door frame -->
  <rect x="64" y="48" width="384" height="396" fill="#0a0c0e" stroke="#2a2e32" stroke-width="4"/>

  <!-- door panel -->
  <rect x="84" y="68" width="344" height="356" fill="url(#door)"/>
  <!-- bolts -->
  <g fill="#9a9ea2">
    <circle cx="100" cy="84" r="4"/><circle cx="412" cy="84" r="4"/>
    <circle cx="100" cy="408" r="4"/><circle cx="412" cy="408" r="4"/>
  </g>
  <!-- ribs / panels -->
  <g stroke="#1c1f22" stroke-width="2" fill="none">
    <rect x="100" y="100" width="312" height="100"/>
    <rect x="100" y="220" width="312" height="100"/>
  </g>
  <!-- center seam -->
  <line x1="256" y1="68" x2="256" y2="424" stroke="#0a0c0e" stroke-width="3"/>

  <!-- handle (locked) -->
  <g transform="translate(220,338)">
    <rect width="72" height="22" rx="4" fill="url(#metal)" stroke="#1c1f22" stroke-width="1.5"/>
    <line x1="36" y1="3" x2="36" y2="19" stroke="#1c1f22" stroke-width="1"/>
  </g>

  <!-- Status screen -->
  <g transform="translate(316,164)">
    <rect width="120" height="60" rx="3" fill="#1a0606" stroke="#3a0a0a" stroke-width="2"/>
    <rect x="4" y="4" width="112" height="52" fill="#260a0a"/>
    <text x="60" y="26" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff3838" font-weight="bold">STATUS:</text>
    <text x="60" y="44" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff5050" font-weight="bold">SEALED</text>
    <!-- blink dot -->
    <circle cx="14" cy="14" r="3" fill="#ff5050"/>
  </g>

  <!-- subtitle: SYNC IN PROGRESS -->
  <text x="256" y="244" text-anchor="middle" font-family="monospace" font-size="11" fill="#c2261c" font-weight="bold">— SYNC IN PROGRESS —</text>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH02 / EVT_000 — DOOR LOCKDOWN</text>
</svg>
