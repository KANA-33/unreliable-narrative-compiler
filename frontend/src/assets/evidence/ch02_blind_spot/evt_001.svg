<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="System Directive - corner broadcast speaker emits a sharp electronic voice about Sector 07 Avalon">
  <defs>
    <radialGradient id="bg21" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="speaker" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3f44"/>
      <stop offset="100%" stop-color="#0e1012"/>
    </linearGradient>
    <radialGradient id="speakerGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c2261c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c2261c" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain21"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg21)"/>
  <rect width="512" height="512" filter="url(#grain21)" opacity="0.55"/>

  <!-- corner walls -->
  <polygon points="0,0 512,0 512,40 256,160 0,40" fill="#10141a"/>
  <line x1="0" y1="40" x2="256" y2="160" stroke="#2a3138" stroke-width="2"/>
  <line x1="512" y1="40" x2="256" y2="160" stroke="#2a3138" stroke-width="2"/>
  <line x1="256" y1="0" x2="256" y2="160" stroke="#2a3138" stroke-width="2"/>

  <!-- speaker glow -->
  <circle cx="256" cy="160" r="240" fill="url(#speakerGlow)"/>

  <!-- corner-mounted speaker -->
  <g transform="translate(196,100)">
    <polygon points="0,0 120,0 120,30 60,90 0,30" fill="url(#speaker)" stroke="#0a0c0e" stroke-width="2"/>
    <ellipse cx="60" cy="46" rx="36" ry="22" fill="#0a0c0e"/>
    <ellipse cx="60" cy="46" rx="22" ry="14" fill="#1c1f22"/>
    <circle cx="60" cy="46" r="5" fill="#3a3f44"/>
  </g>

  <!-- sound waves -->
  <g fill="none" stroke="#c2261c" stroke-width="2" opacity="0.85">
    <path d="M186 240 q 70 30 140 0"/>
    <path d="M156 280 q 100 50 200 0"/>
    <path d="M126 320 q 130 70 260 0"/>
  </g>

  <!-- transmission text panel -->
  <g transform="translate(60,376)">
    <rect width="392" height="100" fill="#0a0c0e" stroke="#3a4a52" stroke-width="2"/>
    <rect x="6" y="6" width="380" height="14" fill="#1c2226"/>
    <text x="14" y="17" font-family="monospace" font-size="10" fill="#9aa6ae">TRANSMISSION / 01:46 / SYS</text>
    <g font-family="monospace" font-size="13" fill="#d6c08a">
      <text x="14" y="42">▶ LOGICAL DEVIATION — SECTOR 07</text>
      <text x="14" y="62">▶ AVALON MAIN PIPE PRESSURE: ABNORMAL</text>
      <text x="14" y="82">▶ DIRECTIVE: PRESSURE RELIEF — 60s</text>
    </g>
  </g>

  <!-- timestamp -->
  <text x="492" y="32" text-anchor="end" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.9">01:46:14</text>
  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH02 / EVT_001 — SYSTEM DIRECTIVE</text>
</svg>
