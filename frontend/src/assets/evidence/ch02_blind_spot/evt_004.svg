<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Re-entry - empty yellowed office chair facing the monitor wall, faint smoke and burnt smell">
  <defs>
    <radialGradient id="bg24" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1c2226"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="phos24" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdd9e2"/>
      <stop offset="100%" stop-color="#3a5664"/>
    </linearGradient>
    <linearGradient id="chair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07a3a"/>
      <stop offset="100%" stop-color="#5a4220"/>
    </linearGradient>
    <filter id="grain24"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg24)"/>
  <rect width="512" height="512" filter="url(#grain24)" opacity="0.55"/>

  <!-- monitor wall ahead (16 grid, smaller) -->
  <g transform="translate(80,40)">
    <rect width="352" height="200" fill="#0a0d0f" stroke="#3a4a52" stroke-width="2"/>
    <g fill="url(#phos24)" opacity="0.8">
      <rect x="6"   y="6"   width="80" height="40"/>
      <rect x="92"  y="6"   width="80" height="40"/>
      <rect x="178" y="6"   width="80" height="40"/>
      <rect x="264" y="6"   width="80" height="40"/>
      <rect x="6"   y="52"  width="80" height="40"/>
      <rect x="92"  y="52"  width="80" height="40"/>
      <rect x="178" y="52"  width="80" height="40" opacity="0.4"/>
      <rect x="264" y="52"  width="80" height="40"/>
      <rect x="6"   y="98"  width="80" height="40"/>
      <rect x="92"  y="98"  width="80" height="40"/>
      <rect x="178" y="98"  width="80" height="40"/>
      <rect x="264" y="98"  width="80" height="40"/>
      <rect x="6"   y="144" width="80" height="40"/>
      <rect x="92"  y="144" width="80" height="40"/>
      <rect x="178" y="144" width="80" height="40"/>
      <rect x="264" y="144" width="80" height="40"/>
    </g>
  </g>

  <!-- floor with chair shadow -->
  <rect x="0" y="320" width="512" height="192" fill="#0d0a07"/>
  <line x1="0" y1="320" x2="512" y2="320" stroke="#2a1a0a" stroke-width="2"/>
  <ellipse cx="256" cy="448" rx="112" ry="14" fill="#000" opacity="0.55"/>

  <!-- empty office chair (rear view) -->
  <g transform="translate(196,256)">
    <!-- backrest -->
    <rect x="0" y="0" width="120" height="100" rx="14" fill="url(#chair)" stroke="#2a1a0a" stroke-width="2"/>
    <!-- seam -->
    <line x1="60" y1="14" x2="60" y2="86" stroke="#2a1a0a" stroke-width="1.5"/>
    <!-- seat -->
    <rect x="-12" y="100" width="144" height="32" rx="6" fill="#7a5a26" stroke="#2a1a0a" stroke-width="2"/>
    <!-- post -->
    <rect x="54" y="132" width="12" height="40" fill="#3a3a3e"/>
    <!-- 5-star base -->
    <g stroke="#3a3a3e" stroke-width="6" stroke-linecap="round">
      <line x1="60" y1="172" x2="-12" y2="200"/>
      <line x1="60" y1="172" x2="40"  y2="208"/>
      <line x1="60" y1="172" x2="80"  y2="208"/>
      <line x1="60" y1="172" x2="132" y2="200"/>
      <line x1="60" y1="172" x2="60"  y2="212"/>
    </g>
  </g>

  <!-- faint smoke wisp drifting up -->
  <g fill="none" stroke="#b8b8b8" stroke-width="2" opacity="0.55">
    <path d="M340 280 q 12 -22 0 -42 q -10 -16 4 -32"/>
    <path d="M360 290 q 14 -18 4 -38"/>
  </g>

  <!-- text label: BURNT ELECTRONICS -->
  <g transform="translate(360,256)">
    <line x1="-12" y1="14" x2="-30" y2="-4" stroke="#a04040" stroke-width="1.5"/>
    <text x="-30" y="-10" font-family="monospace" font-size="10" fill="#a04040" font-weight="bold">BURNT</text>
    <text x="-30" y="2"  font-family="monospace" font-size="10" fill="#a04040" font-weight="bold">ELECTRONICS</text>
  </g>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH02 / EVT_004 — RETURN TO DESK</text>
</svg>
