<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Archive Endpoint - Spatial Continuity Forced stamp on archive paper">
  <defs>
    <linearGradient id="paper2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ecd7"/>
      <stop offset="100%" stop-color="#d6c89a"/>
    </linearGradient>
    <filter id="paperGrain2"><feTurbulence baseFrequency="0.85" numOctaves="3"/><feColorMatrix values="0 0 0 0 0.32 0 0 0 0 0.22 0 0 0 0 0.08 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="#1c1410"/>
  <g transform="translate(40,40)">
    <rect width="432" height="432" fill="url(#paper2)"/>
    <rect width="432" height="432" filter="url(#paperGrain2)" opacity="0.55"/>
    <line x1="32" y1="60" x2="400" y2="60" stroke="#5a4a30" stroke-width="2"/>
    <text x="32" y="50" font-family="monospace" font-size="14" fill="#3a2a14" font-weight="bold">ARCHIVE #002-BLIND</text>
    <text x="400" y="50" text-anchor="end" font-family="monospace" font-size="12" fill="#3a2a14">FILE 091-UN</text>

    <g font-family="monospace" font-size="11" fill="#3a2a14">
      <text x="32" y="92">DOOR LOCKDOWN      . . . . . . . . . . CONFIRMED</text>
      <text x="32" y="116">SECTOR 07 ENTRY    . . . . . . . . . . PATCHED</text>
      <text x="32" y="140">VALVE CALIBRATION  . . . . . . . . . . COMMITTED</text>
      <text x="32" y="164">RETURN TRAJECTORY  . . . . . . . . . . LOGGED</text>
      <text x="32" y="200">— PHYSICAL LAW VIOLATION RECONCILED</text>
      <text x="32" y="224">— SECTOR 07 BLIND-ZONE: REWRITTEN</text>
    </g>
    <line x1="32" y1="252" x2="400" y2="252" stroke="#5a4a30" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Stamp -->
    <g transform="translate(72,300) rotate(-6)">
      <rect x="0" y="0" width="296" height="92" fill="none" stroke="#a6151c" stroke-width="4" rx="4"/>
      <rect x="6" y="6" width="284" height="80" fill="none" stroke="#a6151c" stroke-width="1.5" rx="2"/>
      <text x="148" y="46" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#a6151c">SPATIAL CONTINUITY</text>
      <text x="148" y="74" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#a6151c">FORCED</text>
    </g>
    <g fill="#a6151c" opacity="0.55">
      <circle cx="120" cy="318" r="1"/>
      <circle cx="280" cy="340" r="1.5"/>
      <circle cx="160" cy="386" r="1"/>
      <circle cx="320" cy="392" r="1.2"/>
    </g>

    <text x="32" y="412" font-family="monospace" font-size="11" fill="#3a2a14">OPERATOR: ███████</text>
    <text x="400" y="412" text-anchor="end" font-family="serif" font-style="italic" font-size="14" fill="#1f3056">— sealed —</text>
  </g>
</svg>
