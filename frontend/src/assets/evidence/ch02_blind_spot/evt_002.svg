<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="The Leap - long corridor with sensor lights leading to the Avalon pipe in Sector 07 blind spot">
  <defs>
    <radialGradient id="bg22" cx="50%" cy="80%" r="100%">
      <stop offset="0%" stop-color="#2a2622"/>
      <stop offset="100%" stop-color="#06080a"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1916"/>
      <stop offset="100%" stop-color="#070605"/>
    </linearGradient>
    <radialGradient id="sensor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7c2" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#d68e26" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d68e26" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain22"><feTurbulence baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 0.18 0"/></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg22)"/>
  <rect width="512" height="512" filter="url(#grain22)" opacity="0.55"/>

  <!-- One-point perspective corridor -->
  <!-- ceiling -->
  <polygon points="0,0 512,0 320,180 192,180" fill="#0d0d0e"/>
  <!-- floor -->
  <polygon points="0,512 512,512 320,180 192,180" fill="url(#floor)"/>
  <!-- left wall -->
  <polygon points="0,0 192,180 192,332 0,512" fill="#15171a"/>
  <!-- right wall -->
  <polygon points="512,0 320,180 320,332 512,512" fill="#15171a"/>

  <!-- sensor lights along corridor -->
  <g>
    <circle cx="220" cy="200" r="32" fill="url(#sensor)"/>
    <circle cx="260" cy="260" r="44" fill="url(#sensor)"/>
    <circle cx="300" cy="340" r="60" fill="url(#sensor)"/>
    <circle cx="220" cy="200" r="3" fill="#fff5b8"/>
    <circle cx="260" cy="260" r="4" fill="#fff5b8"/>
    <circle cx="300" cy="340" r="5" fill="#fff5b8"/>
  </g>

  <!-- vanishing-point doorway / blind spot frame -->
  <rect x="222" y="156" width="68" height="64" fill="#000"/>

  <!-- Avalon pipe at end of corridor -->
  <g transform="translate(238,164)">
    <rect width="36" height="48" fill="#1c1c20" stroke="#3a3a3e" stroke-width="1.5"/>
    <rect x="2" y="6" width="32" height="6" fill="#3a3a3e"/>
    <rect x="2" y="36" width="32" height="6" fill="#3a3a3e"/>
    <text x="18" y="30" text-anchor="middle" font-family="monospace" font-size="6" fill="#c2261c" font-weight="bold">AVALON</text>
  </g>

  <!-- camera + dead-zone marker -->
  <g transform="translate(70,90)">
    <rect width="40" height="22" rx="4" fill="#1c1f22" stroke="#3a4046" stroke-width="1.5"/>
    <circle cx="34" cy="11" r="5" fill="#0a0c0e" stroke="#3a4046" stroke-width="1"/>
    <circle cx="34" cy="11" r="2" fill="#c2261c"/>
    <text x="0" y="40" font-family="monospace" font-size="9" fill="#a04040">CAM 07</text>
    <!-- dotted cone of vision -->
    <path d="M40 11 L150 42 L150 -30 Z" fill="none" stroke="#c2261c" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  </g>

  <!-- "BLIND SPOT" label -->
  <g transform="translate(330,210)">
    <line x1="-22" y1="-12" x2="-50" y2="-44" stroke="#c2261c" stroke-width="1.5"/>
    <text x="-50" y="-50" font-family="monospace" font-size="11" fill="#c2261c" font-weight="bold">BLIND SPOT</text>
  </g>

  <!-- caption -->
  <text x="20" y="498" font-family="monospace" font-size="11" fill="#8aa7b3" opacity="0.85">CH02 / EVT_002 — SECTOR 07 / DEAD ZONE</text>
</svg>
